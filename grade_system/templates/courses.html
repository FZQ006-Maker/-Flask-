{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>课程管理</h2>
    <a href="{{ url_for('course_add') }}" class="btn btn-primary">添加课程</a>
</div>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>课程编号</th>
            <th>课程名称</th>
            <th>学分</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ course.course_id }}</td>
            <td>{{ course.name }}</td>
            <td>{{ course.credit }}</td>
            <td>
                <a href="{{ url_for('course_edit', id=course.id) }}" class="btn btn-sm btn-warning">编辑</a>
                <a href="{{ url_for('course_delete', id=course.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确认删除？')">删除</a>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center">暂无课程数据</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
