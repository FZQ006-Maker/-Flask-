{% extends 'base.html' %}
{% block content %}
<h2>{% if course %}编辑课程{% else %}添加课程{% endif %}</h2>
<form method="POST" class="row g-3 mt-2">
    <div class="col-md-4">
        <label class="form-label">课程编号</label>
        <input type="text" name="course_id" class="form-control" value="{{ course.course_id if course else '' }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">课程名称</label>
        <input type="text" name="name" class="form-control" value="{{ course.name if course else '' }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">学分</label>
        <input type="number" step="0.1" name="credit" class="form-control" value="{{ course.credit if course else 0 }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">保存</button>
        <a href="{{ url_for('course_list') }}" class="btn btn-secondary">返回</a>
    </div>
</form>
{% endblock %}
